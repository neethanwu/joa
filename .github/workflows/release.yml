name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: oven-sh/setup-bun@3d267786b128fe76c2f16a390aa2448b815359f3 # v2
        with:
          bun-version: "1.3.9"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      # Quality gates
      - run: bun test
      - run: bunx biome check .
      - run: bunx tsc --noEmit

      # Build and verify on Node.js
      - run: bun run build
      - run: node dist/cli/main.js --version
      - name: Node.js integration test
        run: |
          node dist/cli/main.js log "CI smoke test" --category test
          node dist/cli/main.js query --limit 1
          node dist/cli/main.js status

      # Publish
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
